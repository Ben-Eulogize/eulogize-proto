name: Claude Code Security Review

permissions:
  contents: read

on:
  push:
    branches:
      - develop

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: claude_audit
        uses: anthropics/claude-code-action/base-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_SECURITY_REVIEW_API_KEY }}
          prompt: |
            Run a security-focused code review for changes pushed to develop.
            Review the diff from ${{ github.event.before }} to ${{ github.sha }}.
            Prioritize high-confidence findings in:
            - auth/authz and privilege escalation
            - injection (SQL/command/template)
            - XSS/CSRF/SSRF
            - unsafe file/path handling
            - secret exposure and insecure configuration
            - dependency or supply-chain risk from changed lockfiles/manifests

            Return concise findings with severity, file path, and remediation.
            If no issues are found, say exactly: No security issues found.

      - name: Build human-readable audit summary
        if: ${{ always() }}
        run: |
          REPORT_MD="claude-security-audit-summary.md"
          EXEC_FILE="${{ steps.claude_audit.outputs.execution_file }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "# Claude Security Audit" > "$REPORT_MD"
          echo "" >> "$REPORT_MD"
          echo "- Repository: \`${{ github.repository }}\`" >> "$REPORT_MD"
          echo "- Branch: \`${{ github.ref_name }}\`" >> "$REPORT_MD"
          echo "- Commit: \`${{ github.sha }}\`" >> "$REPORT_MD"
          echo "- Run details: [Open this workflow run]($RUN_URL)" >> "$REPORT_MD"
          echo "" >> "$REPORT_MD"

          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "## Result" >> "$REPORT_MD"
            echo "Audit output file was not found. Please open the workflow logs." >> "$REPORT_MD"
          else
            RESULT_SUBTYPE=$(jq -r '[.[] | select(.type=="result")][-1].subtype // "unknown"' "$EXEC_FILE")
            DURATION_MS=$(jq -r '[.[] | select(.type=="result")][-1].duration_ms // 0' "$EXEC_FILE")
            COST_USD=$(jq -r '[.[] | select(.type=="result")][-1].total_cost_usd // 0' "$EXEC_FILE")
            FINAL_TEXT=$(jq -r '[.[] | select(.type=="assistant") | .message.content[]? | select(.type=="text") | .text] | last // ""' "$EXEC_FILE")

            if [ "$RESULT_SUBTYPE" = "success" ]; then
              echo "## Result" >> "$REPORT_MD"
              echo "Security audit completed successfully." >> "$REPORT_MD"
            else
              echo "## Result" >> "$REPORT_MD"
              echo "Security audit finished with status: \`$RESULT_SUBTYPE\`." >> "$REPORT_MD"
            fi

            echo "" >> "$REPORT_MD"
            echo "## Details" >> "$REPORT_MD"
            echo "- Duration (ms): \`$DURATION_MS\`" >> "$REPORT_MD"
            echo "- Cost (USD): \`$COST_USD\`" >> "$REPORT_MD"
            echo "" >> "$REPORT_MD"
            echo "## Findings Summary" >> "$REPORT_MD"
            if [ -n "$FINAL_TEXT" ]; then
              echo "$FINAL_TEXT" >> "$REPORT_MD"
            else
              echo "No readable findings text was returned. Download the raw JSON artifact for full details." >> "$REPORT_MD"
            fi
          fi

          cat "$REPORT_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifacts
        id: upload_audit_artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: claude-security-audit
          retention-days: 7
          path: |
            claude-security-audit-summary.md
            ${{ steps.claude_audit.outputs.execution_file }}
          if-no-files-found: warn

      - name: Add easy-access links for reviewers (Ben, Nick, Eric and Stephen)
        if: ${{ always() }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_URL="${{ steps.upload_audit_artifact.outputs.artifact-url }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Quick Actions" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$ARTIFACT_URL" ]; then
            echo "[![Download Report](https://img.shields.io/badge/Download%20Report-Click%20Here-0A66C2?style=for-the-badge)]($ARTIFACT_URL)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "[![Download Report](https://img.shields.io/badge/Download%20Report-Open%20Artifacts-0A66C2?style=for-the-badge)](${RUN_URL}#artifacts)" >> "$GITHUB_STEP_SUMMARY"
          fi
