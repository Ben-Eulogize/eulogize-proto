# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: unit-test

on:
  push:
    branches:
      - '**' # matches every branch

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      project-directory: .
      project-name: unit-test
      cache-hash-file-identifier: yarn.lock
      aws-region: ap-southeast-2
      aws-s3-bucket: www-demo.aroundschools.com.au
      aws-cloudfront-distribution-id: E4ZM99UWN0DY5
      aws-access-key-id: ${{secrets.LAPUTAN_PORTAL_AWS_ACCESS_KEY_ID}}
      aws-secret-access-key: ${{secrets.LAPUTAN_PORTAL_AWS_SECRET_ACCESS_KEY}}
      tag-prefix: aroundschools-demo
      release-branches: aroundschools/demo
      github-token: ${{secrets.LAPUTAN_GITHUB_TOKEN}}

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4.1.6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore Lerna cache
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Installing Yarn Libraries
        run: yarn installAndBuild
        working-directory: ${{env.project-directory}}
      - name: Unit test
        run: yarn test
