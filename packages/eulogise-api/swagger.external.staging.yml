  /v2/external/client:
    post:
      summary: Create a new client with API Key
      description: This API allows B2B partner create the client with the configured emails and names of funeral directors
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newClientName
                - country
                - funeralDirectors
              properties:
                newClientName:
                  type: string
                  example: My Funeral Home
                country:
                  type: string
                  enum:
                    - Australia
                    - United States
                  example: United States
                funeralDirectors:
                  type: array
                  items:
                    $ref: '#/components/schemas/FuneralDirectorDetail'
      responses:
        '200':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCreatedSuccessResponse'
        '400':
          description: Bad request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterAPIErrorsPayload'
        '409':
          description: Email already exists for funeral directors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailExistsAPIErrorsPayload'
        '500':
          description: Internal errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClientAPIErrorsPayload'
  /v2/external/funeralDirector:
    post:
      summary: Add a new funeral director to an existing client by client ID
      description: This API allows B2B partner add a new funeral director...
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clientId
                - newFuneralDirectorName
                - newFuneralDirectorEmail
              properties:
                clientId:
                  type: string
                  example: 54995d85-9c52-4b92-97e4-9db10916996f
                newFuneralDirectorName:
                  type: string
                  example: Oscar Piastri
                newFuneralDirectorEmail:
                  type: string
                  example: oscar-piastri@f1.com
      responses:
        '200':
          description: New funeral director created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FuneralDirectorCreatedSuccessResponse'
        '400':
          description: Bad request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterAPIErrorsPayload'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientNotFoundAPIErrorsPayload'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailExistsAPIErrorsPayload'
        '500':
          description: Internal errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddFuneralDirectorAPIErrorsPayload'
