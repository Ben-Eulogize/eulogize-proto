  /v2/external/cases/{caseId}:
    put:
      summary: Update an existing client case
      description: >-
        This API updates an existing case by caseId in the URL and applies only
        the optional fields provided in the request body.
      security:
        - Bearer: []
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
          description: Case ID to update
          example: 78a387a9-190f-421a-9210-2dc1661a60d1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  nullable: true
                  example: Mr
                fullName:
                  type: string
                  example: Bob Lucas
                suffix:
                  type: string
                  nullable: true
                  example: Jr
                nickName:
                  type: string
                  nullable: true
                  example: Bobby
                dateOfBirth:
                  type: string
                  format: date
                  description: Optional. Validated only when provided (YYYY-MM-DD).
                  example: '1968-11-08'
