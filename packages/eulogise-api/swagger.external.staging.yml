                  type: string
                  nullable: true
                  example: John Lucas
                mothersName:
                  type: string
                  nullable: true
                  example: Mary Lucas
                serviceLocation:
                  type: string
                  nullable: true
                  example: Memorial Chapel
                serviceAddress:
                  type: string
                  nullable: true
                  example: Bennelong Point, Sydney NSW 2000
                serviceDate:
                  type: string
                  format: date
                  description: Optional. Validated only when provided (YYYY-MM-DD).
